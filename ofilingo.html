        // ===== CONTENT BANK =====
        const CONTENT = {
            "1": {
                1: {
                    theory: [
                        { title: "¡Bienvenido a Word!", text: "Microsoft Word es el procesador de textos más usado del mundo. Sirve para crear documentos como cartas, informes, y más.", example: "Por ejemplo, puedes escribir una carta para tu abuelita, hacer una tarea del colegio o crear un cuento con dibujos.", tip: "Lo encontrarás en el menú Inicio o buscando 'Word'.", icon: "📝" },
                        { title: "Las partes de Word", text: "Word tiene: Cinta de opciones (arriba), Área de escritura (centro), Barra de estado (abajo), y Panel de navegación (izquierda).", example: "Imagina que Word es como un escritorio: la Cinta de opciones son tus herramientas (lápices, colores), y el Área de escritura es tu hoja en blanco.", tip: "La Cinta de opciones contiene todas las herramientas.", icon: "🖥️" },

                    ], practice: [
                        { q: "¿Qué es Microsoft Word?", opts: ["Un navegador web", "Un procesador de textos", "Una hoja de cálculo", "Un editor de fotos"], ans: 1, type: "mc" },
                        { q: "¿Dónde se encuentran las herramientas principales de Word?", opts: ["Barra de estado", "Panel de navegación", "Cinta de opciones", "Área de escritura"], ans: 2, type: "mc" },
                        { q: "La pestaña 'Inicio' es la que más se usa en Word.", opts: ["Verdadero", "Falso"], ans: 0, type: "tf" },
                        { q: "¿Cuántas pestañas principales tiene la Cinta de opciones?", opts: ["5", "6", "8", "10"], ans: 2, type: "mc" }
                    ]
                },
                2: {

                        { title: "Crear un documento nuevo", text: "Para crear un documento nuevo ve a Archivo > Nuevo > Documento en blanco. También puedes usar el atajo Ctrl+N.", example: "Es como sacar una hoja nueva de tu cuaderno. Presiona Ctrl+N y ¡listo! Tienes una página en blanco para escribir.", tip: "Ctrl+N = Nuevo documento", icon: "📄" },
                        { title: "Plantillas", text: "Word ofrece plantillas prediseñadas para currículums, cartas, folletos y más. Las encuentras en Archivo > Nuevo.", example: "Si quieres hacer una invitación de cumpleaños, no tienes que empezar de cero. Busca 'invitación' en las plantillas y ya tienes un diseño bonito listo.", tip: "Las plantillas te ahorran mucho tiempo.", icon: "📋" },
                        { title: "Tu primer texto", text: "Simplemente empieza a escribir. El cursor parpadeante indica dónde aparecerá el texto. Presiona Enter para un nuevo párrafo.", example: "Prueba escribir: 'Hola, me llamo [tu nombre]'. Verás cómo las letras aparecen donde está la rayita parpadeante.", tip: "No presiones Enter al final de cada línea, Word ajusta el texto automáticamente.", icon: "⌨️" }

        function generateContent(modId, misId) {
            const isExcel = TOOL === 'excel';
            const toolName = isExcel ? 'Excel' : 'Word';
            // For Word Module 1, use the hardcoded fallback already in generateWordContent
            if (!isExcel && modId === 1) return generateWordMod1(misId);

            const missionData = !isExcel && WORD_MISSION_DATA[modId]?.missions[misId];
            if (missionData) {
                const theory = [
                    { title: missionData.t, text: missionData.d + (missionData.k ? `. Atajo: ${missionData.k}` : ''), example: `Practica usando ${missionData.t.toLowerCase()} en tu próximo documento de ${toolName}.`, tip: missionData.k ? `Atajo: ${missionData.k}` : `Busca esta herramienta en la pestaña Inicio.`, icon: missionData.ic }
                ];
                const practice = [];
                if (missionData.k) {
                    practice.push({ type: 'fill', q: `¿Cuál es el atajo para ${missionData.t}?`, ans: [missionData.k, missionData.k.toLowerCase()], hint: 'Es un atajo de teclado...' });
                }
                practice.push({ type: 'mc', q: `¿Qué hace la herramienta "${missionData.t}"?`, opts: ['Guarda el documento', missionData.d, 'Abre un archivo nuevo', 'Imprime la página'], ans: 1 });
                practice.push({ type: 'tf', q: `"${missionData.t}" es una herramienta del módulo ${modId}.`, opts: ['Verdadero', 'Falso'], ans: 0 });
                return { theory, practice };
            }

            // Generic fallback for checkpoints and boss missions with relevant content
            const modNames = {1:"Fundamentos",2:"Formato",3:"Párrafos",4:"Objetos",5:"Herramientas Pro"};
            const isCp = misId % 5 === 0 && misId !== 20;
            const isBoss = misId === 20;
            return {
                theory: [{ title: isBoss ? `Examen Final: ${modNames[modId]}` : isCp ? `¡Checkpoint!` : `Lección ${misId}`, text: isBoss ? `¡Demuestra todo lo que sabes sobre ${modNames[modId]} en ${toolName}!` : isCp ? `Repaso de lo aprendido en ${modNames[modId]}.` : `Profundiza en ${modNames[modId]} con ${toolName}.`, tip: 'Repasa tus notas antes de seguir.', icon: isBoss ? '🏆' : isCp ? '🏁' : '📚' }],
                practice: [
                    { type: 'mc', q: `¿Qué herramienta estamos aprendiendo?`, opts: ['PowerPoint', toolName, 'Paint', 'Notepad'], ans: 1 },
                    { type: 'tf', q: `Estamos en el módulo de ${modNames[modId]}.`, opts: ['Verdadero', 'Falso'], ans: 0 },
                    { type: 'mc', q: `¿Cuál es el atajo universal para guardar?`, opts: ['Ctrl+G', 'Ctrl+S', 'Ctrl+A', 'Alt+S'], ans: 1 }
                ]
            };
        }

        function getContent(modId, misId) {
            const contentBank = TOOL === 'excel' ? EXCEL_CONTENT : CONTENT;
            const modKey = String(modId);
            if (contentBank[modKey] && contentBank[modKey][misId]) return contentBank[modKey][misId];
            return generateContent(modId, misId);
        }

        // ===== PROGRESS (syncs with student system) =====
        const ACTIVE_STUDENT = localStorage.getItem('ofilingo_active_student');
        function loadProgress() { 
            if (ACTIVE_STUDENT) { try { const d = JSON.parse(localStorage.getItem(`ofilingo_student_${ACTIVE_STUDENT}`)); return (TOOL==='excel'?d?.progress_excel:d?.progress_word)||{}; } catch { return {}; } }
            try { return JSON.parse(localStorage.getItem(`ofilingo_progress_${TOOL}_v2`)) || {}; } catch { return {}; } 
        }
        function saveProgressData(d) { 
            if (ACTIVE_STUDENT) { try { const sd = JSON.parse(localStorage.getItem(`ofilingo_student_${ACTIVE_STUDENT}`)); sd[TOOL==='excel'?'progress_excel':'progress_word']=d; localStorage.setItem(`ofilingo_student_${ACTIVE_STUDENT}`,JSON.stringify(sd)); } catch{} }
            localStorage.setItem(`ofilingo_progress_${TOOL}_v2`, JSON.stringify(d)); 
        }
        function loadStats() { 
            if (ACTIVE_STUDENT) { try { const d = JSON.parse(localStorage.getItem(`ofilingo_student_${ACTIVE_STUDENT}`)); return d?.stats||{streak:1,gems:50,hearts:5,xp:0}; } catch { return {streak:1,gems:50,hearts:5,xp:0}; } }
            try { return JSON.parse(localStorage.getItem('ofilingo_stats')) || {streak:1,gems:50,hearts:5,xp:0}; } catch { return {streak:1,gems:50,hearts:5,xp:0}; } 
        }
        function saveStats(s) { 
            if (ACTIVE_STUDENT) { try { const sd = JSON.parse(localStorage.getItem(`ofilingo_student_${ACTIVE_STUDENT}`)); sd.stats=s; localStorage.setItem(`ofilingo_student_${ACTIVE_STUDENT}`,JSON.stringify(sd)); } catch{} }
            localStorage.setItem('ofilingo_stats', JSON.stringify(s)); 
        }

        // ===== INTERACTIVE PRACTICE COMPONENTS =====
        // Match Exercise: Connect items from left to right columns
        const MatchExercise = ({ question, onComplete }) => {
            const [pairs, setPairs] = useState({});
            const [activeLeft, setActiveLeft] = useState(null);
            const [checkResult, setCheckResult] = useState(null);
            const shuffledRight = useMemo(() => [...question.right].sort(() => Math.random()-0.5), []);
            const handleLeftClick = (i) => { if(checkResult) return; setActiveLeft(i); };
            const handleRightClick = (ri) => {
                if(checkResult || activeLeft === null) return;
                const newPairs = {...pairs}; newPairs[activeLeft] = ri;
                setPairs(newPairs); setActiveLeft(null);
            };
            const handleCheck = () => {
                if(checkResult) { onComplete(checkResult === 'correct'); return; }
                const correct = question.pairs.every(p => {
                    const rightItem = question.right[p.right];
                    const selectedRi = pairs[p.left];
                    return selectedRi !== undefined && shuffledRight[selectedRi] === rightItem;
                });
                setCheckResult(correct ? 'correct' : 'incorrect');
            };
            const allPaired = Object.keys(pairs).length === question.left.length;
            return (
                <div>
                    <h1 className="text-xl sm:text-2xl font-bold mb-2" style={{color:'var(--text)'}}>{question.q}</h1>
                    <p className="text-sm font-bold mb-6" style={{color:'var(--text-secondary)'}}>Conecta cada elemento de la izquierda con su pareja</p>
                    <div className="flex gap-4 sm:gap-8 justify-center">
                        <div className="flex flex-col gap-3 flex-1 max-w-[200px]">
                            {question.left.map((item,i) => (
                                <motion.button key={i} whileTap={{scale:0.95}} onClick={()=>handleLeftClick(i)}
                                    className={`p-3 rounded-xl border-2 border-b-4 font-bold text-sm text-center transition-all
                                    ${activeLeft===i?'border-duoBlue bg-blue-50 text-duoBlue shadow-md':''}
                                    ${pairs[i]!==undefined && !checkResult?'border-duoBlue/50 bg-blue-50/50':''}
                                    ${checkResult==='correct' && pairs[i]!==undefined?'border-duoGreen bg-green-50 text-duoGreenDark':''}
                                    ${checkResult==='incorrect'?'border-duoRed/50':''}
                                    ${!checkResult && pairs[i]===undefined && activeLeft!==i?'card-surface border-2':''}
                                `}>{item}</motion.button>
                            ))}
                        </div>
                        <div className="flex flex-col gap-3 flex-1 max-w-[200px]">
                            {shuffledRight.map((item,i) => {
                                const isPaired = Object.values(pairs).includes(i);
                                return (
                                    <motion.button key={i} whileTap={{scale:0.95}} onClick={()=>handleRightClick(i)}
                                        className={`p-3 rounded-xl border-2 border-b-4 font-bold text-sm text-center transition-all
                                        ${isPaired?'border-duoBlue/50 bg-blue-50/50 opacity-60':''}
                                        ${checkResult==='correct' && isPaired?'border-duoGreen bg-green-50 text-duoGreenDark opacity-100':''}
                                        ${!isPaired && !checkResult?'card-surface border-2 cursor-pointer hover:bg-blue-50/30':''}
                                    `}>{item}</motion.button>
                                );
                            })}
                        </div>
                    </div>
                    <div className="mt-8 flex justify-center">
                        <button onClick={handleCheck} disabled={!allPaired && !checkResult}
                            className={`w-full sm:w-auto min-w-[200px] uppercase font-extrabold text-lg py-4 px-8 rounded-2xl border-b-4 active-push transition-all
                            ${!allPaired && !checkResult?'bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed':''}
                            ${(allPaired && !checkResult)?'bg-duoGreen text-white border-duoGreenDark':''}
                            ${checkResult==='correct'?'bg-duoGreen text-white border-duoGreenDark':''}
                            ${checkResult==='incorrect'?'bg-duoRed text-white border-duoRedDark':''}
                        `}>{checkResult ? 'Continuar' : 'Comprobar'}</button>
                    </div>
                    {checkResult && (
                        <motion.div initial={{y:20,opacity:0}} animate={{y:0,opacity:1}} className={`mt-4 p-4 rounded-xl font-bold text-center ${checkResult==='correct'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                            {checkResult==='correct'?'¡Perfecto! Todas las parejas son correctas 🎉':'Algunas parejas no son correctas. ¡Sigue intentando! 💪'}
                        </motion.div>
                    )}
                </div>
            );
        };

        // Order Exercise: Drag items into correct sequence
        const OrderExercise = ({ question, onComplete }) => {
            const [items, setItems] = useState(() => [...question.opts].sort(()=>Math.random()-0.5));
            const [dragIndex, setDragIndex] = useState(null);
            const [checkResult, setCheckResult] = useState(null);
            const moveItem = (from, to) => {
                const newItems = [...items]; const [moved] = newItems.splice(from,1); newItems.splice(to,0,moved); setItems(newItems);
            };
            const handleCheck = () => {
                if(checkResult) { onComplete(checkResult==='correct'); return; }
                const correctOrder = question.ans.map(i=>question.opts[i]);
                const isCorrect = items.every((item,i)=>item===correctOrder[i]);
                setCheckResult(isCorrect?'correct':'incorrect');
                if(!isCorrect) { setTimeout(()=>setItems(correctOrder),1500); }
            };
            return (
                <div>
                    <h1 className="text-xl sm:text-2xl font-bold mb-2" style={{color:'var(--text)'}}>{question.q}</h1>
                    <p className="text-sm font-bold mb-6" style={{color:'var(--text-secondary)'}}>Arrastra los elementos en el orden correcto</p>
                    <div className="flex flex-col gap-2 max-w-lg mx-auto">
                        {items.map((item, i) => (
                            <motion.div key={item} layout draggable onDragStart={()=>setDragIndex(i)}
                                onDragOver={(e)=>{e.preventDefault();}} onDrop={()=>{if(dragIndex!==null){moveItem(dragIndex,i);setDragIndex(null);}}}
                                onDragEnd={()=>setDragIndex(null)}
                                className={`order-item p-4 rounded-xl border-2 border-b-4 font-bold flex items-center gap-3 transition-all
                                ${dragIndex===i?'opacity-50':''}
                                ${checkResult==='correct'?'border-duoGreen bg-green-50 text-duoGreenDark':''}
                                ${checkResult==='incorrect'?'border-duoRed bg-red-50':''}
                                ${!checkResult?'card-surface hover:shadow-md':''}
                            `}>
                                <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm font-black shrink-0" style={{color:'var(--text-secondary)'}}>{i+1}</span>
                                <span className="flex-1">{item}</span>
                                <span className="text-gray-300 cursor-grab">⠿</span>
                            </motion.div>
                        ))}
                    </div>
                    <div className="mt-8 flex justify-center">
                        <button onClick={handleCheck}
                            className={`w-full sm:w-auto min-w-[200px] uppercase font-extrabold text-lg py-4 px-8 rounded-2xl border-b-4 active-push transition-all
                            ${!checkResult?'bg-duoGreen text-white border-duoGreenDark':''}
                            ${checkResult==='correct'?'bg-duoGreen text-white border-duoGreenDark':''}
                            ${checkResult==='incorrect'?'bg-duoRed text-white border-duoRedDark':''}
                        `}>{checkResult?'Continuar':'Comprobar Orden'}</button>
                    </div>
                    {checkResult && (
                        <motion.div initial={{y:20,opacity:0}} animate={{y:0,opacity:1}} className={`mt-4 p-4 rounded-xl font-bold text-center ${checkResult==='correct'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                            {checkResult==='correct'?'¡Orden perfecto! 🎯':'El orden correcto se muestra arriba. ¡Memorízalo! 📝'}
                        </motion.div>
                    )}
                </div>
            );
        };

        // Fill Exercise: Type the answer
        const FillExercise = ({ question, onComplete }) => {
            const [answer, setAnswer] = useState('');
            const [checkResult, setCheckResult] = useState(null);
            const handleCheck = () => {
                if(checkResult) { onComplete(checkResult==='correct'); return; }
                const correct = question.ans.some(a => answer.trim().toLowerCase() === a.toLowerCase());
                setCheckResult(correct?'correct':'incorrect');
            };
            return (
                <div>
                    <h1 className="text-xl sm:text-2xl font-bold mb-2" style={{color:'var(--text)'}}>{question.q}</h1>
                    <p className="text-sm font-bold mb-6" style={{color:'var(--text-secondary)'}}>Escribe tu respuesta</p>
                    <div className="max-w-lg mx-auto">
                        {question.hint && <p className="text-sm mb-3 font-bold" style={{color:'var(--text-secondary)'}}>💡 Pista: {question.hint}</p>}
                        <input type="text" value={answer} onChange={e=>setAnswer(e.target.value)}
                            onKeyDown={e=>{if(e.key==='Enter' && answer.trim())handleCheck();}}
                            placeholder="Escribe aquí..." disabled={!!checkResult}
                            className={`fill-input ${checkResult==='correct'?'correct':''} ${checkResult==='incorrect'?'incorrect':''}`} />
                        {checkResult==='incorrect' && (
                            <motion.p initial={{opacity:0}} animate={{opacity:1}} className="mt-2 text-sm font-bold text-duoRed">
                                La respuesta correcta es: <strong>{question.ans[0]}</strong>
                            </motion.p>
                        )}
                    </div>
                    <div className="mt-8 flex justify-center">
                        <button onClick={handleCheck} disabled={!answer.trim() && !checkResult}
                            className={`w-full sm:w-auto min-w-[200px] uppercase font-extrabold text-lg py-4 px-8 rounded-2xl border-b-4 active-push transition-all
                            ${!answer.trim() && !checkResult?'bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed':''}
                            ${answer.trim() && !checkResult?'bg-duoGreen text-white border-duoGreenDark':''}
                            ${checkResult==='correct'?'bg-duoGreen text-white border-duoGreenDark':''}
                            ${checkResult==='incorrect'?'bg-duoRed text-white border-duoRedDark':''}
                        `}>{checkResult?'Continuar':'Comprobar'}</button>
                    </div>
                    {checkResult==='correct' && (
                        <motion.div initial={{y:20,opacity:0}} animate={{y:0,opacity:1}} className="mt-4 p-4 rounded-xl font-bold text-center bg-green-100 text-green-700">
                            ¡Exacto! Lo escribiste correctamente ✍️
                        </motion.div>
                    )}
                </div>
            );
        };

        // ===== APP =====
        function App() {
            const content = useMemo(() => getContent(MODULE_ID, MISSION_ID), []);
            const [phase, setPhase] = useState(PHASE);
            const [cardIndex, setCardIndex] = useState(0);
            const [qIndex, setQIndex] = useState(0);
            const [selected, setSelected] = useState(null);
            const [status, setStatus] = useState('idle');
            const [lives, setLives] = useState(5);
            const [errors, setErrors] = useState(0);
            const [showResults, setShowResults] = useState(false);
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('ofilingo_dark_mode') === 'true');

            useEffect(() => { document.body.classList.toggle('dark', darkMode); }, [darkMode]);

            const cards = content.theory;
            const questions = content.practice;
            const goBack = () => { window.location.href = 'ofilingo-app.html'; };

            const completeTheory = () => {
                const progress = loadProgress();
                const key = `${MODULE_ID}-${MISSION_ID}`;
                progress[key] = { ...(progress[key] || {}), theoryDone: true };
                saveProgressData(progress);
                const stats = loadStats();
                stats.xp = (stats.xp || 0) + 10;
                saveStats(stats);
                goBack();
            };

            const completePractice = () => {
                const stars = errors === 0 ? 3 : errors === 1 ? 2 : 1;
                const xpGain = stars === 3 ? 30 : stars === 2 ? 20 : 10;
                const progress = loadProgress();
                const key = `${MODULE_ID}-${MISSION_ID}`;
                const prevStars = progress[key]?.stars || 0;
                progress[key] = { ...(progress[key] || {}), completed: true, theoryDone: true, stars: Math.max(prevStars, stars) };
                saveProgressData(progress);
                const stats = loadStats();
                stats.xp = (stats.xp || 0) + xpGain;
                stats.gems = (stats.gems || 0) + (stars === 3 ? 5 : 2);
                saveStats(stats);
                setShowResults({ stars, xpGain });
            };

            const handleInteractiveComplete = (correct) => {
                if (!correct) { setErrors(e => e + 1); setLives(l => Math.max(0, l - 1)); }
                if (qIndex + 1 >= questions.length) { completePractice(); }
                else { setQIndex(qIndex + 1); setSelected(null); setStatus('idle'); }
            };

            const handleCheck = () => {
                if (status !== 'idle') {
                    setStatus('idle'); setSelected(null);
                    if (qIndex + 1 >= questions.length) { completePractice(); }
                    else { setQIndex(qIndex + 1); }
                    return;
                }
                if (selected === null) return;
                const question = questions[qIndex];
                if (selected === question.ans) { setStatus('correct'); }
                else { setStatus('incorrect'); setErrors(e => e + 1); setLives(l => Math.max(0, l - 1)); }
            };

            const progressPercent = phase === 'theory'
                ? ((cardIndex + 1) / cards.length) * 100
                : ((qIndex + 1) / questions.length) * 100;

            // ===== RESULTS SCREEN =====
            if (showResults) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{background:'var(--bg)'}}>
                        <motion.div initial={{ scale: 0 }} animate={{ scale: 1 }} className="text-center">
                            <div className="text-6xl mb-4">🎉</div>
                            <h1 className="text-3xl font-black mb-2" style={{color:'var(--text)'}}>¡Misión Completada!</h1>
                            <p className="font-bold mb-6" style={{color:'var(--text-secondary)'}}>+{showResults.xpGain} XP</p>
                            <div className="flex justify-center gap-3 mb-8">
                                {[1, 2, 3].map(s => (
                                    <motion.div key={s} initial={{ scale: 0, rotate: -30 }} animate={{ scale: 1, rotate: 0 }} transition={{ delay: 0.3 + s * 0.2, type: "spring" }}>
                                        <StarIcon size={48} fill={s <= showResults.stars ? "#FFC800" : "#E5E5E5"} stroke={s <= showResults.stars ? "#D4A600" : "#CCC"} />
                                    </motion.div>
                                ))}
                            </div>
                            <p className="text-lg font-bold mb-8" style={{color:'var(--text)'}}>
                                {showResults.stars === 3 ? "¡Perfecto! Sin errores 🌟" : showResults.stars === 2 ? "¡Muy bien! Solo 1 error 👏" : "¡Completado! Sigue practicando 💪"}
                            </p>
                            <button onClick={goBack} className="bg-duoGreen text-white font-bold text-lg py-4 px-12 rounded-2xl border-b-4 border-duoGreenDark active-push uppercase tracking-wider">Continuar</button>
                        </motion.div>
                    </div>
                );
            }

            // ===== THEORY PHASE =====
            if (phase === 'theory') {
                const card = cards[cardIndex];
                return (
                    <div className="min-h-screen flex flex-col" style={{background:'var(--bg)'}}>
                        <div className="w-full max-w-3xl mx-auto px-4 pt-6 flex items-center gap-4">
                            <button onClick={goBack} className="p-2 rounded-xl transition-colors" style={{color:'var(--text-secondary)'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
                            <div className="flex-1 h-4 rounded-full overflow-hidden" style={{background:'var(--border)'}}>
                                <motion.div className="h-full bg-duoGreen rounded-full" animate={{ width: `${progressPercent}%` }} transition={{ type: "spring", stiffness: 50 }}><div className="h-1 bg-white/30 rounded-full mx-1 mt-1" /></motion.div>
                            </div>
                            <span className="text-sm font-bold min-w-[32px] text-center" style={{color:'var(--text-secondary)'}}>{cardIndex + 1}/{cards.length}</span>
                        </div>
                        <div className="flex-1 flex items-center justify-center p-4">
                            <AnimatePresence mode="wait">
                                <motion.div key={cardIndex} initial={{ x: 100, opacity: 0 }} animate={{ x: 0, opacity: 1 }} exit={{ x: -100, opacity: 0 }} transition={{ type: "spring", stiffness: 200, damping: 25 }}
                                    className="w-full max-w-lg rounded-3xl p-6 sm:p-8 shadow-lg border-2" style={{background:'var(--bg-card)',borderColor:'var(--border)'}}>
                                    <div className="text-5xl mb-4 text-center">{card.icon}</div>
                                    <h2 className="text-2xl font-black mb-3 text-center" style={{color:'var(--text)'}}>{card.title}</h2>
                                    <p className="text-base leading-relaxed mb-4 text-center" style={{color:'var(--text)'}}>{card.text}</p>
                                    {card.example && (
                                        <div className="rounded-xl p-4 flex items-start gap-3 mb-4 border-2" style={{background:'var(--green-bg)',borderColor:'var(--green-border)'}}>
                                            <span className="text-xl">📌</span>
                                            <p className="text-sm font-bold" style={{color:'var(--green-text)'}}>{card.example}</p>
                                        </div>
                                    )}
                                    <div className="rounded-xl p-4 flex items-start gap-3 border-2" style={{background:'var(--blue-bg)',borderColor:'var(--blue-border)'}}>
                                        <span className="text-xl">💡</span>
                                        <p className="text-sm font-bold" style={{color:'var(--blue-text)'}}>{card.tip}</p>
                                    </div>
                                </motion.div>
                            </AnimatePresence>
                        </div>
                        <div className="w-full max-w-3xl mx-auto px-4 pb-8">
                            <button onClick={() => {
                                if (cardIndex + 1 >= cards.length) completeTheory();
                                else setCardIndex(cardIndex + 1);
                            }} className="w-full py-4 text-lg bg-duoGreen text-white rounded-2xl font-bold uppercase tracking-wider border-b-4 border-duoGreenDark active-push">
                                {cardIndex + 1 >= cards.length ? 'Completar Teoría ✓' : 'Continuar →'}
                            </button>
                        </div>
                    </div>
                );
            }

            // ===== PRACTICE PHASE =====
            const question = questions[qIndex];
            const isInteractive = question.type === 'match' || question.type === 'order' || question.type === 'fill';
            const isTF = question.type === 'tf';

            return (
                <div className="min-h-screen flex flex-col pb-28" style={{background:'var(--bg)'}}>
                    <div className="w-full max-w-3xl mx-auto px-4 pt-6 flex items-center gap-4">
                        <button onClick={goBack} className="p-2 rounded-xl transition-colors" style={{color:'var(--text-secondary)'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
                        <div className="flex-1 h-4 rounded-full overflow-hidden" style={{background:'var(--border)'}}>
                            <motion.div className="h-full bg-duoGreen rounded-full" animate={{ width: `${progressPercent}%` }} transition={{ type: "spring", stiffness: 50 }}><div className="h-1 bg-white/30 rounded-full mx-1 mt-1" /></motion.div>
                        </div>
                        <motion.div className="flex items-center gap-1 font-bold text-duoRed mx-1" key={lives} initial={{ scale: 1.3 }} animate={{ scale: 1 }}>
                            <HeartIcon filled={lives > 0} /> <span className="w-4">{lives}</span>
                        </motion.div>
                    </div>

                    <main className="flex-1 w-full max-w-3xl mx-auto px-4 mt-8">
                        <AnimatePresence mode="wait">
                            <motion.div key={qIndex} initial={{ x: 60, opacity: 0 }} animate={{ x: 0, opacity: 1 }} exit={{ x: -60, opacity: 0 }}>
                                {isInteractive ? (
                                    question.type === 'match' ? <MatchExercise question={question} onComplete={handleInteractiveComplete} /> :
                                    question.type === 'order' ? <OrderExercise question={question} onComplete={handleInteractiveComplete} /> :
                                    <FillExercise question={question} onComplete={handleInteractiveComplete} />
                                ) : (
                                    <div>
                                        <h1 className="text-xl sm:text-2xl font-bold mb-8" style={{color:'var(--text)'}}>{question.q}</h1>
                                        <div className={`grid gap-3 ${isTF ? 'grid-cols-2' : 'grid-cols-1'}`}>
                                            {question.opts.map((opt, i) => (
                                                <motion.button key={i} whileHover={status==='idle'?{scale:1.01}:{}} whileTap={status==='idle'?{scale:0.98}:{}}
                                                    onClick={() => status==='idle' && setSelected(i)}
                                                    className={`p-4 rounded-2xl border-2 border-b-4 font-bold text-left transition-all
                                                    ${status!=='idle'?'cursor-default':'cursor-pointer'}
                                                    ${selected===i?'border-duoBlue bg-blue-50 text-duoBlue':'hover:bg-gray-50'}
                                                    ${status!=='idle' && i===question.ans?'border-duoGreen bg-green-50 text-duoGreenDark':''}
                                                    ${status==='incorrect' && selected===i?'border-duoRed bg-red-50 text-duoRedDark':''}
                                                `} style={selected!==i && status==='idle'?{background:'var(--bg-card)',borderColor:'var(--border)',color:'var(--text)'}:{}}>
                                                    <span className="flex items-center gap-3">
                                                        <span className={`w-8 h-8 rounded-full border-2 flex items-center justify-center text-sm font-black shrink-0
                                                        ${selected===i?'border-duoBlue bg-duoBlue text-white':'border-gray-300 text-gray-400'}`}>
                                                            {String.fromCharCode(65+i)}
                                                        </span>{opt}
                                                    </span>
                                                </motion.button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </motion.div>
                        </AnimatePresence>
                    </main>

                    {!isInteractive && (<>
                        <AnimatePresence>
                            {status !== 'idle' && (
                                <motion.div initial={{y:200,opacity:0}} animate={{y:0,opacity:1}} exit={{y:200,opacity:0}}
                                    className={`fixed bottom-0 w-full pt-6 pb-24 px-6 border-t-[3px] z-0 ${status==='correct'?'border-[#89E219]':'border-[#FF4B4B]'}`}
                                    style={{background:status==='correct'?'var(--feedback-correct)':'var(--feedback-wrong)'}}>
                                    <div className="max-w-3xl mx-auto flex items-center gap-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white text-xl ${status==='correct'?'bg-duoGreen':'bg-duoRed'}`}>
                                            {status==='correct'?'✓':'✕'}
                                        </div>
                                        <div>
                                            <h2 className={`text-xl font-black ${status==='correct'?'text-duoGreenDark':'text-duoRedDark'}`}>
                                                {status==='correct'?'¡Correcto!':'Respuesta correcta:'}
                                            </h2>
                                            {status==='incorrect' && <p className="font-bold text-duoRedDark">{question.opts[question.ans]}</p>}
                                        </div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                        <div className="fixed bottom-0 left-0 right-0 py-5 px-4 z-10 pointer-events-none">
                            <div className="max-w-3xl mx-auto flex justify-end">
                                <button onClick={handleCheck} disabled={selected===null && status==='idle'}
                                    className={`pointer-events-auto w-full sm:w-auto min-w-[200px] uppercase font-extrabold text-lg py-4 px-8 rounded-2xl border-b-4 active-push transition-all
                                    ${status==='idle' && selected===null?'bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed':''}
                                    ${status==='idle' && selected!==null?'bg-duoGreen text-white border-duoGreenDark':''}
                                    ${status==='correct'?'bg-duoGreen text-white border-duoGreenDark':''}
                                    ${status==='incorrect'?'bg-duoRed text-white border-duoRedDark':''}
                                `}>{status==='idle'?'Comprobar':'Continuar'}</button>
                            </div>
                        </div>
                    </>)}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
