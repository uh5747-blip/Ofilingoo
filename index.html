    <style>
        :root { --bg: #FFFFFF; --bg-card: #FFFFFF; --bg-sidebar: #FFFFFF; --text: #4B4B4B; --text-gray: #AFAFBE; --border: #E5E5E5; --border-light: #F0F0F0; }
        body.dark { --bg: #131F24; --bg-card: #1B2B33; --bg-sidebar: #0F1A20; --text: #E2E8F0; --text-gray: #8899A6; --border: #2D3F49; --border-light: #253540; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #E5E5E5;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #AFAFBE;
        }

        .active-push:active {
            transform: translateY(4px);
            box-shadow: none !important;
            margin-top: 4px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .float-anim {
            animation: float 2.5s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid currentColor;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent 25%, rgba(255, 255, 255, 0.3) 50%, transparent 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        .path-line {
            position: absolute;
            width: 4px;
            background: #E5E5E5;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
        }
    </style>
</head>

        const getMissionStatus = (progress, moduleId, missionId) => {
            const key = `${moduleId}-${missionId}`;
            const data = progress[key];
            if (!data) {
                // First mission of first module is always available
                if (moduleId === 1 && missionId === 1) return 'available';
                // Check if previous mission is completed
                const prevMission = missionId > 1 ? missionId - 1 : null;
                const prevModule = missionId === 1 && moduleId > 1 ? moduleId - 1 : null;
                if (prevMission) {
                    const prevKey = `${moduleId}-${prevMission}`;
                    const prevData = progress[prevKey];
                    if (prevData && prevData.completed) return 'available';
                } else if (prevModule) {
                    const prevKey = `${prevModule}-20`;
                    const prevData = progress[prevKey];
                    if (prevData && prevData.completed) return 'available';
                }
                return 'locked';
            }
            if (data.completed) return 'completed';
            if (data.theoryDone) return 'theory-done';
            return 'available';
        };

                        <CheckCircleIcon />;
            } else if (isTheoryDone) {
                bgStyle = { background: `linear-gradient(135deg, ${moduleColor}, ${moduleColorDark})` };
                borderColor = moduleColorDark;
                content = <BookIcon />;
            } else if (isAvailable) {
                bgStyle = { background: moduleColor };
                borderColor = moduleColorDark;
                content = isCheckpoint ? '🏁' : isBoss ? <TrophyIcon /> : <span className="text-2xl">▶</span>;
            }

            return (
                <div className="relative flex justify-center w-full" style={{ marginBottom: '12px' }}>
                    <div className="relative z-10" style={{ marginLeft: `${offset}px` }}>
                        {/* Tooltip for available */}
                        {isAvailable && (
                            <motion.div
                                initial={{ opacity: 0, y: 8 }}
                                animate={{ opacity: 1, y: 0 }}
                                className="absolute -top-14 left-1/2 -translate-x-1/2 bg-white border-2 border-gray-200 px-3 py-1.5 rounded-xl shadow-md text-xs font-bold whitespace-nowrap cursor-pointer z-20"
                            >
                                <span className="text-textMain">¡Empezar!</span>
                                <div className="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-2.5 h-2.5 bg-white border-b-2 border-r-2 border-gray-200 transform rotate-45" />
                            </motion.div>
                        )}

                        {/* Stars display for completed */}
                        {isCompleted && stars > 0 && (
                            <div className="absolute -bottom-5 left-1/2 -translate-x-1/2 flex gap-0.5 z-20">
                                {[1, 2, 3].map(s => (
                                    <StarIcon key={s} size={14}
                                        fill={s <= stars ? "#FFC800" : "#E5E5E5"}
                                        stroke={s <= stars ? "#D4A600" : "#CCC"}
                                    />
                                ))}
                            </div>
                        )}

                        <motion.button
                            onClick={() => !isLocked && onSelect(mission, moduleId)}
                            whileHover={!isLocked ? { scale: 1.08 } : {}}
                            whileTap={!isLocked ? { scale: 0.95 } : {}}
                            animate={isAvailable ? { y: [0, -5, 0] } : {}}
                            transition={isAvailable ? { repeat: Infinity, duration: 2, ease: "easeInOut" } : {}}
                            className={`${nodeSize} rounded-full flex items-center justify-center text-white relative transition-all
                                ${isLocked ? 'cursor-not-allowed opacity-70' : 'cursor-pointer'}
                                ${isCheckpoint ? 'ring-4 ring-offset-2' : ''}
                                ${isBoss ? 'ring-4 ring-offset-2' : ''}
                            `}
                            style={{
                                ...bgStyle,
                                borderBottom: `4px solid ${borderColor}`,
                                ...(isCheckpoint ? { ringColor: moduleColor + '40' } : {}),
                                ...(isBoss ? { ringColor: '#FFC80060' } : {}),
                            }}
                        >
                            {/* 3D highlight */}
                            <div className="absolute top-1.5 left-2 right-2 h-2 bg-white/20 rounded-full" />
                            {content}

                            {/* Progress ring for available */}
                            {(isAvailable || isTheoryDone) && (
                                <svg className="absolute w-[calc(100%+16px)] h-[calc(100%+16px)] -top-2 -left-2" viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)' }}>
                                    <circle cx="50" cy="50" r="46" fill="transparent" stroke="#E5E5E5" strokeWidth="6" />
                                    <circle cx="50" cy="50" r="46" fill="transparent" stroke={isTheoryDone ? moduleColor : "#FFC800"} strokeWidth="6"
                                        strokeDasharray="289" strokeDashoffset={isTheoryDone ? "145" : "250"} strokeLinecap="round" />
                                </svg>
                            )}

                            {/* Checkpoint/Boss decorations */}
                            {isCheckpoint && !isLocked && (
                                <div className="absolute -inset-1 rounded-full border-2 border-dashed animate-spin" style={{ borderColor: moduleColor + '50', animationDuration: '10s' }} />
                            )}
                        </motion.button>
                    </div>
                </div>
            );
        };

        // ========== MODULE SECTION ==========
        const ModuleSection = ({ module, progress, onSelectMission }) => {
            const completedCount = getModuleProgress(progress, module.id);
            const isModuleComplete = completedCount === 20;
            const progressPercent = (completedCount / 20) * 100;

            return (
                <div className="w-full flex flex-col mb-8 relative">
                    {/* Module Header */}
                    <div className={`bg-gradient-to-r ${module.bgClass} rounded-2xl p-4 sm:p-6 mb-6 text-white flex items-center justify-between shadow-lg relative overflow-hidden`}>
                        <div className="absolute inset-0 shimmer pointer-events-none" />
                        <div className="flex items-center gap-4 z-10">
                            <div className="text-3xl sm:text-4xl">{module.emoji}</div>
                            <div>
                                <h2 className="text-lg sm:text-xl font-black">{module.title}</h2>
                                <p className="font-bold opacity-90 text-xs sm:text-sm">{module.subtitle}</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-2 z-10">
                            {isModuleComplete && (
                                <div className="bg-white/20 px-3 py-1 rounded-full flex items-center gap-1 text-xs font-bold">
                                    <CrownIcon /> ¡Completado!
                                </div>
                            )}
                            <div className="flex items-center gap-2">
                                <div className="w-24 sm:w-32 h-3 bg-white/20 rounded-full overflow-hidden">
                                    <div className="h-full bg-white/80 rounded-full transition-all duration-700"
                                        style={{ width: `${progressPercent}%` }} />
                                </div>
                                <span className="text-xs font-bold opacity-90">{completedCount}/20</span>
                            </div>
                        </div>
                    </div>

                    {/* Mission Path */}
                    <div className="flex flex-col items-center w-full relative pt-2 pb-4">
                        {/* Vertical line */}
                        <div className="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 w-3 bg-gray-100 rounded-full -z-10" />

                        {module.missions.map((mission, i) => {
                            const status = getMissionStatus(progress, module.id, mission.id);
                            const stars = getMissionStars(progress, module.id, mission.id);
                            return (
                                <MissionNode
                                    key={mission.id}
                                    mission={mission}
                                    moduleId={module.id}
                                    moduleColor={module.color}
                                    moduleColorDark={module.colorDark}
                                    status={status}
                                    stars={stars}
                                    onSelect={onSelectMission}
                                    index={i}
                                />
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ========== MISSION MODAL ==========
        const MissionModal = ({ mission, moduleId, module, progress, onClose, tool }) => {
            if (!mission) return null;
            const status = getMissionStatus(progress, moduleId, mission.id);
            const stars = getMissionStars(progress, moduleId, mission.id);
            const isTheoryDone = status === 'theory-done' || status === 'completed';
            const isCompleted = status === 'completed';
            const isCheckpoint = mission.type === 'checkpoint';
            const isBoss = mission.type === 'boss';

            const goToLesson = (phase) => {
                window.location.href = `ofilingo.html?module=${moduleId}&mission=${mission.id}&phase=${phase}&tool=${tool}`;
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-[100] flex justify-center items-end sm:items-center p-4 sm:p-0"
                    onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <motion.div
                        initial={{ y: "100%", opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        exit={{ y: "100%", opacity: 0 }}
                        transition={{ type: "spring", stiffness: 300, damping: 30 }}
                        className="bg-white w-full sm:w-[420px] rounded-3xl p-6 flex flex-col shadow-2xl relative"
                    >
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 bg-gray-100 p-2 rounded-full">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                            </svg>
                        </button>

                        {/* Header */}
                        <div className="flex items-center gap-3 mb-1 mt-1">
                            <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white text-xl font-black shadow-md"
                                style={{ background: module.color }}>
                                {isCheckpoint ? '🏁' : isBoss ? '🏆' : mission.id}
                            </div>
                            <div>
                                <p className="text-textGray font-bold text-xs uppercase tracking-wider">{module.title}</p>
                                <h2 className="text-xl font-black text-textMain">{mission.title}</h2>
                            </div>
                        </div>

                        <p className="text-textGray font-semibold text-sm mb-5 ml-1">{mission.topic}</p>

                        {/* Stars */}
                        {isCompleted && (
                            <div className="flex justify-center gap-2 mb-5">
                                {[1, 2, 3].map(s => (
                                    <motion.div key={s} initial={{ scale: 0 }} animate={{ scale: 1 }} transition={{ delay: s * 0.15 }}>
                                        <StarIcon size={32} fill={s <= stars ? "#FFC800" : "#E5E5E5"} stroke={s <= stars ? "#D4A600" : "#CCC"} />
                                    </motion.div>
                                ))}
                            </div>
                        )}

                        {/* Action Buttons */}
                        <div className="flex flex-col gap-3">
                            <button
                                onClick={() => goToLesson('theory')}
                                className={`w-full py-4 text-lg rounded-2xl font-bold uppercase tracking-wider border-b-4 active-push transition-all flex items-center justify-center gap-3
                                    ${isTheoryDone
                                        ? 'bg-gray-100 text-textGray border-gray-200'
                                        : 'text-white shadow-md'
                                    }`}
                                style={!isTheoryDone ? { background: module.color, borderColor: module.colorDark } : {}}
                            >
                                <BookIcon />
                                {isTheoryDone ? '✓ Teoría Completada' : 'Fase 1: Teoría'}
                            </button>

                            <button
                                onClick={() => isTheoryDone ? goToLesson('practice') : null}
                                disabled={!isTheoryDone}
                                className={`w-full py-4 text-lg rounded-2xl font-bold uppercase tracking-wider border-b-4 active-push transition-all flex items-center justify-center gap-3
                                    ${!isTheoryDone
                                        ? 'bg-gray-100 text-gray-300 border-gray-200 cursor-not-allowed'
                                        : isCompleted
                                            ? 'bg-white border-2 border-gray-200 text-textMain hover:bg-gray-50'
                                            : 'text-white shadow-md'
                                    }`}
                                style={isTheoryDone && !isCompleted ? { background: '#1CB0F6', borderColor: '#1899D6' } : {}}
                            >
                                <PencilIcon />
                                {isCompleted ? '↻ Repetir Práctica' : !isTheoryDone ? '🔒 Primero la Teoría' : 'Fase 2: Práctica'}
                            </button>
                        </div>

                        {!isTheoryDone && (
                            <p className="text-center text-textGray text-xs font-semibold mt-3">
                                Completa la teoría para desbloquear la práctica
                            </p>
                        )}
                    </motion.div>
                </div>
            );
        };

        // ========== TOOL SELECTOR ==========
        const ToolSelector = ({ selectedTool, onSelectTool }) => (
            <div className="mb-8">
                <h2 className="text-gray-400 font-bold uppercase tracking-widest text-xs mb-3 text-center sm:text-left">Elige tu herramienta</h2>
                <div className="flex gap-3 sm:gap-4">
                    <motion.button
                        whileHover={{ scale: 1.03 }} whileTap={{ scale: 0.97 }}
                        onClick={() => onSelectTool('word')}
                        className={`flex-1 flex items-center gap-3 p-4 rounded-2xl border-2 border-b-4 font-bold transition-all ${
                            selectedTool === 'word'
                                ? 'border-wordBlue bg-blue-50 text-wordBlue shadow-md'
                                : 'border-gray-200 text-textGray hover:bg-gray-50'
                        }`}
                    >
                        <WordLogo />
                        <div className="text-left">
                            <p className="font-black text-sm sm:text-base">Word</p>
                            <p className="text-xs opacity-70">Documentos</p>
                        </div>
                    </motion.button>
                    <motion.button
                        whileHover={{ scale: 1.03 }} whileTap={{ scale: 0.97 }}
                        onClick={() => onSelectTool('excel')}
                        className={`flex-1 flex items-center gap-3 p-4 rounded-2xl border-2 border-b-4 font-bold transition-all ${
                            selectedTool === 'excel'
                                ? 'border-excelGreen bg-green-50 text-excelGreen shadow-md'
                                : 'border-gray-200 text-textGray hover:bg-gray-50'
                        }`}
                    >
                        <ExcelLogo />
                        <div className="text-left">
                            <p className="font-black text-sm sm:text-base">Excel</p>
                            <p className="text-xs opacity-70">Hojas de cálculo</p>
                        </div>
                    </motion.button>
                </div>
            </div>
        );

        // ========== LEAGUE VIEW ==========
        const LeagueView = ({ userProfile, stats }) => {
            const mockPlayers = [
                { name: 'Sofía M.', xp: 2450, seed: 'Sophia' },
                { name: 'Carlos R.', xp: 1890, seed: 'Carlos' },
                { name: 'Valentina L.', xp: 1750, seed: 'Valentina' },
                { name: 'Diego P.', xp: 1200, seed: 'Diego' },
                { name: 'Isabella G.', xp: 980, seed: 'Isabella' },
                { name: 'Mateo S.', xp: 820, seed: 'Mateo' },
                { name: 'Camila V.', xp: 650, seed: 'Camila' },
                { name: 'Andrés F.', xp: 430, seed: 'Andres' },
                { name: 'Luciana B.', xp: 310, seed: 'Luciana' }
            ];
            const allPlayers = [...mockPlayers, { name: userProfile?.name || 'Tú', xp: stats?.xp || 0, seed: userProfile?.avatarSeed || 'Felix', isUser: true }];
            allPlayers.sort((a, b) => b.xp - a.xp);
            const medals = ['🥇', '🥈', '🥉'];
            return (
                <div className="w-full max-w-2xl mx-auto px-4 sm:px-8 py-8 sm:py-10 pb-32">
                    <div className="text-center mb-8">
                        <div className="text-5xl mb-2">🏆</div>
                        <h1 className="text-2xl font-black" style={{color:'var(--text)'}}>Liga Bronce</h1>
                        <p className="font-bold" style={{color:'var(--text-gray)'}}>Top 10 de la semana</p>
                    </div>
                    <div className="flex flex-col gap-2">
                        {allPlayers.map((p, i) => (
                            <motion.div key={p.name} initial={{x:-20,opacity:0}} animate={{x:0,opacity:1}} transition={{delay:i*0.05}}
                                className={`flex items-center gap-4 p-4 rounded-2xl border-2 ${p.isUser?'border-duoBlue bg-blue-50/50 shadow-md':''}`}
                                style={!p.isUser?{borderColor:'var(--border)',background:'var(--bg-card)'}:{}}>
                                <span className="font-black text-lg w-8 text-center" style={{color: i<3?'':p.isUser?'#1CB0F6':'var(--text-gray)'}}>
                                    {i < 3 ? medals[i] : (i + 1)}
                                </span>
                                <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${p.seed}`} alt="" className="w-10 h-10 rounded-full" style={{background:'var(--border-light)'}} />
                                <span className="flex-1 font-bold" style={{color: p.isUser?'#1CB0F6':'var(--text)'}}>{p.name} {p.isUser ? '(Tú)' : ''}</span>
                                <span className="font-black text-duoYellow">{p.xp} XP</span>
                            </motion.div>
                        ))}
                    </div>
                </div>
            );
        };

        // ========== DARK MODE ICON ==========
        const SunIcon = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const MoonIcon = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
        const UserIcon = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const UsersIcon = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;

        // ========== STUDENT SYSTEM ==========
        const getStudents = () => { try { return JSON.parse(localStorage.getItem('ofilingo_students')) || []; } catch { return []; } };
        const saveStudents = (s) => localStorage.setItem('ofilingo_students', JSON.stringify(s));
        const getActiveStudent = () => localStorage.getItem('ofilingo_active_student');
        const setActiveStudent = (id) => localStorage.setItem('ofilingo_active_student', id);
        const getStudentData = (id) => { try { return JSON.parse(localStorage.getItem(`ofilingo_student_${id}`)) || null; } catch { return null; } };
        const saveStudentData = (id, data) => localStorage.setItem(`ofilingo_student_${id}`, JSON.stringify(data));

        const createStudent = (name, avatarSeed) => {
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
            const students = getStudents();
            students.push({ id, name, avatarSeed, createdAt: new Date().toISOString() });
            saveStudents(students);
            saveStudentData(id, { profile: { name, avatarSeed }, stats: { streak: 1, gems: 50, hearts: 5, xp: 0 }, progress_word: {}, progress_excel: {} });
            setActiveStudent(id);
            return id;
        };

        // ========== STUDENT SELECTOR ==========
        const StudentSelector = ({ onSelect }) => {
            const [students, setStudentsList] = useState(getStudents);
            const [creating, setCreating] = useState(students.length === 0);
            const [newName, setNewName] = useState('');
            const [newSeed, setNewSeed] = useState('Felix');
            const SEEDS = ['Felix', 'Aneka', 'Mittens', 'Peanut', 'Oliver', 'Mimi', 'Snickers', 'Boots'];

            const handleCreate = () => {
                if (!newName.trim()) return;
                const id = createStudent(newName.trim(), newSeed);
                onSelect(id);
            };

            const handleSelect = (id) => { setActiveStudent(id); onSelect(id); };

            if (creating) return (
                <div className="min-h-screen flex items-center justify-center p-6" style={{background:'var(--bg)'}}>
                    <motion.div initial={{scale:0.9,opacity:0}} animate={{scale:1,opacity:1}} className="w-full max-w-sm rounded-3xl p-8 shadow-2xl border-2" style={{background:'var(--bg-card)',borderColor:'var(--border)'}}>
                        <h1 className="text-3xl font-black text-center mb-2" style={{color:'var(--text)'}}>¡Bienvenido a OfiLingo!</h1>
                        <p className="text-center font-bold mb-6" style={{color:'var(--text-gray)'}}>Crea tu perfil de estudiante</p>
                        <div className="flex justify-center mb-4">
                            <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${newSeed}`} alt="avatar" className="w-20 h-20 rounded-full border-4 border-duoGreen" style={{background:'var(--border-light)'}} />
                        </div>
                        <div className="grid grid-cols-4 gap-2 mb-4">
                            {SEEDS.map(s => (
                                <div key={s} onClick={()=>setNewSeed(s)} className={`cursor-pointer rounded-xl border-2 p-1 flex justify-center ${newSeed===s?'border-duoBlue':'hover:opacity-80'}`} style={{borderColor:newSeed===s?'':'var(--border)'}}>
                                    <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${s}`} alt={s} className="w-10 h-10" />
                                </div>
                            ))}
                        </div>
                        <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Tu nombre..." className="w-full border-2 rounded-xl p-3 mb-4 font-bold outline-none focus:border-duoBlue" style={{background:'var(--bg)',borderColor:'var(--border)',color:'var(--text)'}} onKeyDown={e=>{if(e.key==='Enter')handleCreate();}} />
                        <button onClick={handleCreate} disabled={!newName.trim()} className={`w-full py-3 rounded-2xl font-bold uppercase tracking-wider border-b-4 active-push ${newName.trim()?'bg-duoGreen text-white border-duoGreenDark':'bg-gray-200 text-gray-400 border-gray-300'}`}>Crear Perfil</button>
                        {students.length > 0 && <button onClick={()=>setCreating(false)} className="w-full mt-3 py-2 font-bold rounded-xl" style={{color:'var(--text-gray)'}}>← Seleccionar existente</button>}
                    </motion.div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-6" style={{background:'var(--bg)'}}>
                    <motion.div initial={{scale:0.9,opacity:0}} animate={{scale:1,opacity:1}} className="w-full max-w-sm rounded-3xl p-8 shadow-2xl border-2" style={{background:'var(--bg-card)',borderColor:'var(--border)'}}>
                        <h1 className="text-2xl font-black text-center mb-1" style={{color:'var(--text)'}}>OfiLingo</h1>
                        <p className="text-center font-bold mb-6" style={{color:'var(--text-gray)'}}>¿Quién eres?</p>
                        <div className="flex flex-col gap-3 mb-4">
                            {students.map(s => (
                                <motion.button key={s.id} whileHover={{scale:1.02}} whileTap={{scale:0.98}} onClick={()=>handleSelect(s.id)}
                                    className="flex items-center gap-4 p-4 rounded-2xl border-2 border-b-4 font-bold transition-all hover:shadow-md" style={{background:'var(--bg-card)',borderColor:'var(--border)',color:'var(--text)'}}>
                                    <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${s.avatarSeed}`} alt="avatar" className="w-12 h-12 rounded-full" style={{background:'var(--border-light)'}} />
                                    <span className="flex-1 text-left text-lg">{s.name}</span>
                                    <span style={{color:'var(--text-gray)'}}>▶</span>
                                </motion.button>
                            ))}
                        </div>
                        <button onClick={()=>setCreating(true)} className="w-full py-3 bg-duoBlue text-white rounded-2xl font-bold border-b-4 border-duoBlueDark active-push">+ Nuevo Estudiante</button>
                    </motion.div>
                </div>
            );
        };

        // ========== TEACHER PANEL ==========
        const TeacherPanel = ({ onClose }) => {
            const students = getStudents();
            return (
                <div className="fixed inset-0 z-[100] flex justify-center items-center p-4" style={{background:'rgba(0,0,0,0.6)'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
                    <motion.div initial={{scale:0.9,opacity:0}} animate={{scale:1,opacity:1}} className="w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-3xl p-6 shadow-2xl" style={{background:'var(--bg-card)'}}>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-black" style={{color:'var(--text)'}}>📋 Panel del Maestro</h2>
                            <button onClick={onClose} className="p-2 rounded-full" style={{color:'var(--text-gray)'}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                        </div>
                        {students.length===0 ? <p className="text-center py-8 font-bold" style={{color:'var(--text-gray)'}}>No hay estudiantes registrados</p> : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead><tr className="border-b-2" style={{borderColor:'var(--border)'}}>
                                        <th className="p-3 font-black" style={{color:'var(--text-gray)'}}>Estudiante</th>
                                        <th className="p-3 font-black text-center" style={{color:'var(--text-gray)'}}>XP</th>
                                        <th className="p-3 font-black text-center" style={{color:'var(--text-gray)'}}>Word</th>
                                        <th className="p-3 font-black text-center" style={{color:'var(--text-gray)'}}>Excel</th>
                                        <th className="p-3 font-black text-center" style={{color:'var(--text-gray)'}}>Racha</th>
                                    </tr></thead>
                                    <tbody>
                                        {students.map(s => {
                                            const data = getStudentData(s.id);
                                            if(!data) return null;
                                            const wordDone = Object.values(data.progress_word||{}).filter(p=>p.completed).length;
                                            const excelDone = Object.values(data.progress_excel||{}).filter(p=>p.completed).length;
                                            return (
                                                <tr key={s.id} className="border-b" style={{borderColor:'var(--border-light)'}}>
                                                    <td className="p-3"><div className="flex items-center gap-3">
                                                        <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${s.avatarSeed}`} alt="" className="w-8 h-8 rounded-full" />
                                                        <span className="font-bold" style={{color:'var(--text)'}}>{s.name}</span>
                                                    </div></td>
                                                    <td className="p-3 text-center font-black text-duoYellow">{data.stats?.xp||0}</td>
                                                    <td className="p-3 text-center font-bold" style={{color:'var(--text)'}}>{wordDone}/100</td>
                                                    <td className="p-3 text-center font-bold" style={{color:'var(--text)'}}>{excelDone}/100</td>
                                                    <td className="p-3 text-center font-bold text-duoYellow">🔥 {data.stats?.streak||0}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </motion.div>
                </div>
            );
        };

        // ========== PROFILE VIEW ==========
        const ProfileView = ({ profile, stats, progress, onSaveProfile, darkMode, onToggleDark, onLogout, onShowTeacher }) => {
            const [editing, setEditing] = useState(false);
            const totalWord = Object.values(getProgress('word')).filter(p=>p.completed).length;
            const totalExcel = Object.values(getProgress('excel')).filter(p=>p.completed).length;
            return (
                <div className="w-full max-w-2xl mx-auto px-4 sm:px-8 py-8 sm:py-10 pb-32">
                    <div className="flex flex-col items-center mb-8">
                        <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${profile.avatarSeed}`} alt="avatar" className="w-24 h-24 rounded-full border-4 border-duoGreen mb-3" style={{background:'var(--border-light)'}} />
                        <h1 className="text-2xl font-black" style={{color:'var(--text)'}}>{profile.name}</h1>
                        <p className="font-bold" style={{color:'var(--text-gray)'}}>{stats.xp} XP Total</p>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
                        {[{l:'Racha',v:`🔥 ${stats.streak}`,c:'text-duoYellow'},{l:'Gemas',v:stats.gems,c:'text-duoBlue'},{l:'Word',v:`${totalWord}/100`,c:'text-wordBlue'},{l:'Excel',v:`${totalExcel}/100`,c:'text-excelGreen'}].map((s,i) => (
                            <div key={i} className="rounded-2xl border-2 p-4 text-center" style={{borderColor:'var(--border)',background:'var(--bg-card)'}}>
                                <p className="text-xs font-bold uppercase" style={{color:'var(--text-gray)'}}>{s.l}</p>
                                <p className={`text-xl font-black ${s.c}`}>{s.v}</p>
                            </div>
                        ))}
                    </div>
                    <div className="flex flex-col gap-3">
                        <button onClick={()=>setEditing(true)} className="w-full p-4 rounded-2xl border-2 border-b-4 font-bold flex items-center gap-3 active-push" style={{borderColor:'var(--border)',background:'var(--bg-card)',color:'var(--text)'}}>
                            <UserIcon /> Editar Perfil
                        </button>
                        <button onClick={onToggleDark} className="w-full p-4 rounded-2xl border-2 border-b-4 font-bold flex items-center gap-3 active-push" style={{borderColor:'var(--border)',background:'var(--bg-card)',color:'var(--text)'}}>
                            {darkMode ? <SunIcon /> : <MoonIcon />} {darkMode ? 'Modo Claro' : 'Modo Oscuro'}
                        </button>
                        <button onClick={onShowTeacher} className="w-full p-4 rounded-2xl border-2 border-b-4 font-bold flex items-center gap-3 active-push" style={{borderColor:'var(--border)',background:'var(--bg-card)',color:'var(--text)'}}>
                            <UsersIcon /> Panel del Maestro
                        </button>
                        <button onClick={onLogout} className="w-full p-4 rounded-2xl border-2 border-b-4 font-bold flex items-center gap-3 text-duoRed active-push" style={{borderColor:'var(--border)',background:'var(--bg-card)'}}>
                            ↩ Cambiar Estudiante
                        </button>
                    </div>
                    {editing && <ProfileModal profile={profile} onClose={()=>setEditing(false)} onSave={onSaveProfile} />}
                </div>
            );
        };

        // ========== APP ==========
        function App() {
            const [studentId, setStudentId] = useState(() => getActiveStudent());
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('ofilingo_dark_mode') === 'true');
            const [view, setView] = useState('learn'); // learn, league, profile
            const [selectedTool, setSelectedTool] = useState(() => localStorage.getItem('ofilingo_selected_tool') || 'word');
            const [selectedMission, setSelectedMission] = useState(null);
            const [selectedModuleId, setSelectedModuleId] = useState(null);
            const [showTeacher, setShowTeacher] = useState(false);

            // Student data
            const studentData = studentId ? getStudentData(studentId) : null;
            const [profile, setProfile] = useState(() => studentData?.profile || { name: 'Estudiante', avatarSeed: 'Felix' });
            const [stats, setStats] = useState(() => studentData?.stats || { streak: 1, gems: 50, hearts: 5, xp: 0 });
            const [progress, setProgress] = useState(() => {
                if (studentData) return selectedTool === 'excel' ? (studentData.progress_excel || {}) : (studentData.progress_word || {});
                return getProgress(selectedTool);
            });

            useEffect(() => { document.body.classList.toggle('dark', darkMode); }, [darkMode]);

            const toggleDark = () => {
                const next = !darkMode; setDarkMode(next);
                localStorage.setItem('ofilingo_dark_mode', next.toString());
            };

            const syncStudentData = () => {
                if (!studentId) return;
                const data = getStudentData(studentId);
                if (data) {
                    setProfile(data.profile); setStats(data.stats);
                    setProgress(selectedTool === 'excel' ? (data.progress_excel||{}) : (data.progress_word||{}));
                }
            };

            const handleToolChange = (tool) => {
                setSelectedTool(tool);
                localStorage.setItem('ofilingo_selected_tool', tool);
                if (studentId) {
                    const data = getStudentData(studentId);
                    if (data) setProgress(tool === 'excel' ? (data.progress_excel||{}) : (data.progress_word||{}));
                } else { setProgress(getProgress(tool)); }
                setSelectedMission(null); setSelectedModuleId(null);
            };

            useEffect(() => {
                const handleFocus = () => {
                    if (studentId) {
                        const data = getStudentData(studentId);
                        if (data) { setStats(data.stats); setProgress(selectedTool==='excel'?(data.progress_excel||{}):(data.progress_word||{})); }
                    } else {
                        const tool = localStorage.getItem('ofilingo_selected_tool') || 'word';
                        setSelectedTool(tool); setProgress(getProgress(tool)); setStats(getStats());
                    }
                };
                window.addEventListener('focus', handleFocus);
                return () => window.removeEventListener('focus', handleFocus);
            }, [studentId, selectedTool]);

            const handleSelectMission = (mission, moduleId) => { setSelectedMission(mission); setSelectedModuleId(moduleId); };
            const handleSaveProfile = (p) => {
                setProfile(p);
                if (studentId) {
                    const data = getStudentData(studentId); data.profile = p; saveStudentData(studentId, data);
                    const students = getStudents(); const s = students.find(s=>s.id===studentId);
                    if(s){s.name=p.name;s.avatarSeed=p.avatarSeed;saveStudents(students);}
                }
            };

            const handleLogout = () => { localStorage.removeItem('ofilingo_active_student'); setStudentId(null); };
            const handleStudentSelect = (id) => { setStudentId(id); syncStudentData(); window.location.reload(); };

            if (!studentId) return <StudentSelector onSelect={handleStudentSelect} />;

            const currentModules = selectedTool === 'excel' ? EXCEL_MODULES_DATA : MODULES_DATA;
            const selectedModule = selectedModuleId ? currentModules.find(m => m.id === selectedModuleId) : null;
            const isExcel = selectedTool === 'excel';
            const navItems = [
                {id:'learn',icon:<HomeIcon />,label:'Aprender'},
                {id:'league',icon:<ShieldIcon />,label:'Ligas'},
                {id:'profile',icon:<UserIcon />,label:'Perfil'}
            ];

            return (
                <div className="min-h-screen flex relative" style={{color:'var(--text)'}}>
                    <AnimatePresence>
                        {selectedMission && (
                            <MissionModal mission={selectedMission} moduleId={selectedModuleId} module={selectedModule} progress={progress}
                                onClose={() => { setSelectedMission(null); setSelectedModuleId(null); }} tool={selectedTool} />
                        )}
                    </AnimatePresence>
                    {showTeacher && <TeacherPanel onClose={()=>setShowTeacher(false)} />}

                    {/* Side Nav */}
                    <nav className="hidden sm:flex flex-col w-64 h-screen fixed left-0 top-0 border-r-2 p-6 pt-8 z-50" style={{background:'var(--bg-sidebar)',borderColor:'var(--border)'}}>
                        <h1 className="text-3xl font-black text-duoGreen mb-10 pl-2">ofilingo</h1>
                        <div className="flex flex-col gap-2">
                            {navItems.map(n => (
                                <button key={n.id} onClick={()=>setView(n.id)} className={`flex items-center gap-4 p-3 rounded-2xl font-bold uppercase tracking-wide transition-colors text-left
                                    ${view===n.id?'text-duoBlue bg-blue-50 border-2 border-blue-100':''}`}
                                    style={view!==n.id?{color:'var(--text-gray)'}:{}}>
                                    {n.icon} {n.label}
                                </button>
                            ))}
                        </div>
                        <div className="mt-auto">
                            <button onClick={toggleDark} className="flex items-center gap-3 p-3 rounded-2xl font-bold w-full transition-colors" style={{color:'var(--text-gray)'}}>
                                {darkMode ? <SunIcon /> : <MoonIcon />} {darkMode ? 'Claro' : 'Oscuro'}
                            </button>
                        </div>
                    </nav>

                    <div className="flex-1 sm:ml-64 lg:mr-80" style={{background:'var(--bg)'}}>
                        {/* Desktop Top Bar */}
                        <header className="sticky top-0 backdrop-blur-md z-40 border-b-2 hidden sm:flex justify-end py-3 px-6" style={{background:'var(--bg)',borderColor:'var(--border)'}}>
                            <div className="flex items-center gap-8 font-bold text-lg">
                                <div className="flex items-center gap-2 text-duoYellow p-2 rounded-xl cursor-pointer"><FlameIcon /> {stats.streak}</div>
                                <div className="flex items-center gap-2 text-duoBlue p-2 rounded-xl cursor-pointer"><GemIcon /> {stats.gems}</div>
                                <div className="flex items-center gap-2 text-duoRed p-2 rounded-xl cursor-pointer"><HeartIcon /> {stats.hearts}</div>
                            </div>
                        </header>
                        {/* Mobile Top Bar */}
                        <header className="sticky top-0 backdrop-blur-md z-40 border-b-2 flex sm:hidden justify-between items-center py-3 px-4 shadow-sm" style={{background:'var(--bg)',borderColor:'var(--border)'}}>
                            <h1 className="text-xl font-black text-duoGreen">ofilingo</h1>
                            <div className="flex items-center gap-3 font-bold text-sm">
                                <div className="flex items-center gap-1 text-duoYellow"><FlameIcon /> {stats.streak}</div>
                                <div className="flex items-center gap-1 text-duoBlue"><GemIcon /> {stats.gems}</div>
                                <div className="flex items-center gap-1 text-duoRed"><HeartIcon /> {stats.hearts}</div>
                            </div>
                        </header>

                        {view === 'learn' && (
                            <main className="w-full max-w-2xl mx-auto px-4 sm:px-8 py-8 sm:py-10 pb-32">
                                <ToolSelector selectedTool={selectedTool} onSelectTool={handleToolChange} />
                                <div className="mb-8 text-center sm:text-left">
                                    <h2 className="font-bold uppercase tracking-widest text-xs mb-2" style={{color:'var(--text-gray)'}}>Tu Ruta de Aprendizaje</h2>
                                    <div className="flex items-center gap-3 justify-center sm:justify-start">
                                        {isExcel ? <ExcelLogo /> : <WordLogo />}
                                        <div>
                                            <h1 className="text-2xl sm:text-3xl font-black" style={{color:'var(--text)'}}>
                                                Domina <span className={isExcel?'text-excelGreen':'text-wordBlue'}>{isExcel?'Microsoft Excel':'Microsoft Word'}</span>
                                            </h1>
                                            <p className="font-bold text-sm" style={{color:'var(--text-gray)'}}>100 misiones • 5 módulos</p>
                                        </div>
                                    </div>
                                </div>
                                {currentModules.map(module => (
                                    <ModuleSection key={`${selectedTool}-${module.id}`} module={module} progress={progress} onSelectMission={handleSelectMission} />
                                ))}
                            </main>
                        )}

                        {view === 'league' && <LeagueView userProfile={profile} stats={stats} />}
                        {view === 'profile' && <ProfileView profile={profile} stats={stats} progress={progress} onSaveProfile={handleSaveProfile} darkMode={darkMode} onToggleDark={toggleDark} onLogout={handleLogout} onShowTeacher={()=>setShowTeacher(true)} />}
                    </div>

                    {/* Right Sidebar */}
                    <aside className="hidden lg:flex flex-col w-80 fixed right-0 top-0 h-screen p-8 pt-24 gap-6 overflow-y-auto" style={{borderLeft:`2px solid var(--border)`,background:'var(--bg-sidebar)'}}>
                        <div className="border-2 rounded-2xl p-5" style={{borderColor:'var(--border)',background:'var(--bg-card)'}}>
                            <div className="flex items-center gap-4 mb-4">
                                <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${profile.avatarSeed}`} alt="avatar" className="w-14 h-14 rounded-full shadow-md" style={{background:'var(--border-light)'}} />
                                <div>
                                    <h3 className="font-black text-lg" style={{color:'var(--text)'}}>{profile.name}</h3>
                                    <p className="text-sm font-bold" style={{color:'var(--text-gray)'}}>{stats.xp} XP Total</p>
                                </div>
                            </div>
                            <div className="h-3 rounded-full overflow-hidden" style={{background:'var(--border-light)'}}>
                                <div className="h-full bg-gradient-to-r from-duoGreen to-emerald-400 rounded-full transition-all duration-500"
                                    style={{ width: `${(Object.values(progress).filter(p=>p.completed).length / 100) * 100}%` }} />
                            </div>
                            <p className="text-xs font-bold mt-2" style={{color:'var(--text-gray)'}}>{Object.values(progress).filter(p=>p.completed).length}/100 misiones</p>
                        </div>
                        <div className="border-2 rounded-2xl p-5" style={{borderColor:'var(--border)',background:'var(--bg-card)'}}>
                            <h3 className="font-bold text-lg mb-3 flex items-center gap-2" style={{color:'var(--text)'}}><CrownIcon /> Metas Diarias</h3>
                            <div className="flex flex-col gap-3">
                                <div className="flex gap-3 items-center"><div className="text-duoYellow"><StarIcon size={24} /></div>
                                    <div className="flex-1"><h4 className="font-bold text-sm" style={{color:'var(--text)'}}>Completa 3 misiones</h4>
                                    <div className="h-3 rounded-full mt-1 overflow-hidden" style={{background:'var(--border-light)'}}><div className="h-full bg-duoYellow rounded-full" style={{width:'33%'}} /></div></div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Mobile Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 w-full border-t-2 sm:hidden z-50 flex justify-around p-3 pb-6" style={{background:'var(--bg)',borderColor:'var(--border)'}}>
                        {navItems.map(n => (
                            <button key={n.id} onClick={()=>setView(n.id)} className={`p-2 rounded-xl ${view===n.id?'text-duoBlue bg-blue-50':''}`} style={view!==n.id?{color:'var(--text-gray)'}:{}}>
                                {n.icon}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
